services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roller}
      POSTGRES_USER: ${POSTGRES_USER:-roller}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roller}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://roller:roller@postgres:5432/roller}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # In-container layout (matches ./ansible:/opt/ansible). Not taken from .env so
      # host-local ./ansible/... values never override these inside the container.
      ANSIBLE_ROOT: /opt/ansible
      ANSIBLE_ROLES_PATH: /opt/ansible/roles
      ANSIBLE_GENERATED_PATH: /opt/ansible/generated
      ROLLER_RUN_LOG_DIR: /app/logs
      ANSIBLE_RUN_TIMEOUT_SECONDS: ${ANSIBLE_RUN_TIMEOUT_SECONDS:-300}
    volumes:
      - ./ansible:/opt/ansible
      - ./logs:/app/logs
      # Mount the whole ./ssh dir so Docker never creates a stray file/dir at a missing single-file path.
      # entrypoint copies the private key with chmod 600 (OpenSSH rejects loose perms on bind mounts).
      - ./ssh:/opt/roller/ssh_keys:ro
    depends_on:
      postgres:
        condition: service_healthy

  target1:
    build:
      context: ./targets
      dockerfile: Dockerfile
    ports:
      - "2221:22"
    volumes:
      - ./ssh:/opt/roller/ssh_keys:ro

  target2:
    build:
      context: ./targets
      dockerfile: Dockerfile
    ports:
      - "2222:22"
    volumes:
      - ./ssh:/opt/roller/ssh_keys:ro

volumes:
  postgres_data:
